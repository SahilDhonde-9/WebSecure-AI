<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}WebSecure AI{% endblock %}</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #090b10;
            color: #e8eef7;
        }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; min-height: 100vh; background: radial-gradient(circle at top left, #1d1f3e 0%, #08102a 54%, #04050d 100%); color: #e8eef7; }
        a { color: inherit; text-decoration: none; }
        .page { width: 100vw; min-height: 100vh; margin: 0 auto; padding: 32px 36px 40px; }
        header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 18px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { margin: 0; font-size: 2.6rem; letter-spacing: -0.04em; color: #7af9a3; }
        header p { margin: 0; opacity: 0.82; max-width: 780px; }
        .top-nav { display: flex; flex-wrap: wrap; justify-content: flex-start; align-items: center; gap: 10px; margin-top: 18px; }
        .top-nav a { display: inline-flex; align-items: center; padding: 12px 16px; border-radius: 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); color: #e8eef7; transition: transform .14s ease, background .14s ease, border-color .14s ease; }
        .top-nav a:hover { transform: translateY(-1px); background: rgba(92,255,184,0.18); border-color: rgba(92,255,184,0.3); }
        .banner { display: grid; gap: 20px; margin-top: 26px; }
        .card { background: linear-gradient(180deg, rgba(5, 12, 37, 0.96), rgba(18, 24, 58, 0.96)); border: 1px solid rgba(72, 136, 255, 0.14); border-radius: 24px; padding: 28px; box-shadow: 0 28px 80px rgba(0,0,0,0.28); }
        .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
        .badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); font-size: 0.95rem; }
        .badge.success { color: #8cff7a; }
        .badge.medium { color: #ffd166; }
        .badge.high { color: #ff6d6d; }
        .field-group { display: grid; gap: 12px; }
        label { font-weight: 700; color: #c6d5ff; }
        input { width: 100%; padding: 16px 18px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: #f8fbff; }
        button { border: none; cursor: pointer; border-radius: 14px; font-weight: 700; padding: 14px 20px; transition: transform .14s ease, background .14s ease; }
        button.primary { background: #5cffb8; color: #081214; }
        button.secondary { background: rgba(255,255,255,0.06); color: #d7e0ff; }
        button:hover { transform: translateY(-1px); }
        .metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 20px; }
        .metric { padding: 20px; border-radius: 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .metric strong { display: block; margin-bottom: 8px; font-size: 0.95rem; color: #d6deff; }
        .metric span { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; }
        .console { background: rgba(3, 10, 24, 0.95); border: 1px solid rgba(92, 255, 184, 0.16); padding: 18px; border-radius: 16px; font-family: 'Courier New', monospace; line-height: 1.6; white-space: pre-wrap; min-height: 120px; }
        .console.info { color: #9dd0ff; }
        .console.success { color: #8cff7a; }
        .console.error { color: #ff8fa2; }
        .console.warn { color: #ffd166; }
        .section-title { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
        .pill-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .pill { background: rgba(255,255,255,0.04); padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08); font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
        th { color: #9bb1ff; font-weight: 700; }
        tr:hover { background: rgba(255,255,255,0.03); }
        .progress-shell { margin-top: 18px; border-radius: 16px; background: rgba(255,255,255,0.08); overflow: hidden; border: 1px solid rgba(255,255,255,0.12); }
        .progress-bar { width: 0%; height: 16px; background: linear-gradient(90deg, #5cffb8, #52c6ff); transition: width .2s ease; }
        .progress-label { margin-top: 12px; font-family: 'Courier New', monospace; color: #c2e8ff; }
        @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
        @media print { body { background: #fff; color: #111; } .page { padding: 0; } header, .top-nav, button, .section-title button, .history-card { display: none !important; } .card { border: none; box-shadow: none; background: transparent; } }
    </style>
</head>
<body>
<div class="page">
    <header>
        <div>
            <h1>🛡️ WebSecure AI</h1>
            <p>Enter a target on the home page, then use the dedicated pages for feature scans, full summary, and toolbox utilities.</p>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
            <div class="badge success">Live Demo</div>
        </div>
    </header>
    <nav class="top-nav">
        <a href="/">Home</a>
        <a href="/features">Features</a>
        <a href="/scan-summary">Scan Summary</a>
        <a href="/manual-toolbox">Manual Toolbox</a>
    </nav>
    {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
